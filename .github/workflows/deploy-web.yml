name: Deploy web (trigger backend Fly deploy)

# The web client is served same-origin by the backend on Fly.io: the backend's
# deploy workflow checks out THIS repo's master, builds the Flutter web, and
# ships it. So an app-only release must ask the backend to redeploy — otherwise
# the live web at trippo.io.vn stays on the previously deployed build.
#
# Needs a repo secret DEPLOY_DISPATCH_TOKEN: a PAT (classic: `workflow` scope,
# or fine-grained: Actions = Read/Write on vodongha/travel-mate). Without it the
# job just logs a notice and skips.
on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger backend deploy (rebuilds & ships the web client)
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_DISPATCH_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::notice::DEPLOY_DISPATCH_TOKEN not set — skipping auto-deploy. Add the secret to enable it."
            exit 0
          fi
          gh workflow run deploy.yml --repo vodongha/travel-mate --ref master
          echo "Triggered the backend Fly deploy for vodongha/travel-mate."
