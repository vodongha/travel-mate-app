name: travel_mate_app
description: "TravelMate — group-trip planning & shared-expense (Android + Web)."
publish_to: "none"
version: 1.0.0+23

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  # Localization (en/vi) — generated AppLocalizations from lib/l10n/*.arb.
  flutter_localizations:
    sdk: flutter
  # State management — one controller per feature, mirrors the backend service layer.
  flutter_riverpod: ^3.3.2
  # HTTP — one configured Dio with a bearer-token + refresh interceptor.
  dio: ^5.10.0
  # Declarative routing with an auth-aware redirect guard.
  go_router: ^17.3.0
  # JWT access + refresh tokens stored encrypted at rest (Keychain / Keystore).
  flutter_secure_storage: ^10.3.1
  # Persists the chosen language.
  shared_preferences: ^2.5.5
  # Money + date formatting (the app only formats; the backend owns the maths).
  # Pinned to the version flutter_localizations allows (it caps intl below 0.20.3).
  intl: ^0.20.2
  # QR: render an invite/ticket from its string; scan a QR into its decoded string
  # (SPEC §2.7 — we store strings, never images).
  qr_flutter: ^4.1.0
  # Open the privacy policy + community forum in the browser / a new tab.
  url_launcher: ^6.3.2
  # In-app WebView (About → website, community/support) on Android/iOS. Never
  # imported on a web-reachable path — web uses an <iframe> via package:web and
  # opens external sites in a new tab via url_launcher.
  webview_flutter: ^4.14.0
  # The web <iframe> platform view (used only by app_web_view_web.dart).
  web: ^1.1.1
  # App version shown on the Settings/About screen.
  package_info_plus: ^10.2.0
  # Phone input with country picker + E.164 validation (mirrors family-budget-app).
  phone_form_field: ^10.0.17
  # Scan a ticket QR into its decoded string (camera). We store the string, render on view.
  mobile_scanner: ^7.2.0
  # Pick an image from the gallery to scan a QR out of it (works where the live camera can't —
  # notably web). Uses the Android Photo Picker, so no storage permission is needed.
  image_picker: ^1.2.3
  # Decode a QR from a picked image in pure Dart — works on web too (mobile_scanner.analyzeImage
  # throws UnsupportedError on web). `image` decodes the file to pixels; `zxing2` reads the QR.
  image: ^4.9.1
  zxing2: ^0.2.4
  # Request the camera permission at runtime before opening the scanner (else "genericError").
  permission_handler: ^12.0.3
  # OpenStreetMap map for trip places (no API key needed). latlong2 supplies LatLng.
  flutter_map: ^8.3.1
  latlong2: ^0.10.1
  # Device location ("my location" on the maps; asks permission at runtime).
  geolocator: ^14.0.3
  # Google Sign-In: returns a Google ID token the backend verifies (POST /auth/google).
  google_sign_in: ^7.2.0
  # Web Google Sign-In uses Google Identity Services' rendered button (web_only.renderButton).
  google_sign_in_web: ^1.1.3
  # Firebase core + Cloud Messaging (push). Config in lib/firebase_options.dart.
  firebase_core: ^4.11.0
  firebase_messaging: ^16.4.1
  # Google Play in-app updates (Play Core) — background flexible / blocking immediate flow.
  in_app_update: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  generate: true
  # Modern, friendly typography applied across the whole app theme (see core/theme.dart).
  # One variable TTF (wght axis 200–800); Flutter maps fontWeight onto the axis, so every
  # weight is covered by a single bundled file — no runtime font download.
  fonts:
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans.ttf

# App launcher icons + web favicon (run: dart run flutter_launcher_icons).
# Source art lives in assets/icon/ (a location pin on an indigo gradient).
flutter_launcher_icons:
  android: "ic_launcher"
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#4F46E5"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/icon/icon.png"
    background_color: "#4F46E5"
    theme_color: "#4F46E5"
